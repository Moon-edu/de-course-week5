version: '3'

services:
  postgres-hw:
    image: postgres:14.5
    environment:
      POSTGRES_USER: stock-importer
      POSTGRES_PASSWORD: stock
      POSTGRES_DB: stock
    volumes:
      - ./init_hw.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - 5432:5432

  postgres:
    image: postgres:14.5
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    hostname: postgres.server.local
    networks:
      vpcbr:
        ipv4_address: 10.5.0.5

  airflow:
    build: .
    image: airflow-local
    ports:
      - "8080:8080"
    depends_on:
      - postgres
    tty: true
    volumes:
      - ./homework/dags:/root/airflow/dags
    networks:
      vpcbr:
        ipv4_address: 10.5.0.6
    extra_hosts:
      - "postgres.server.local:10.5.0.5"

volumes:
    postgres:
networks:
  vpcbr:
    driver: bridge
    ipam:
     config:
       - subnet: 10.5.0.0/16
         gateway: 10.5.0.1